<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course | Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/img/lms-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .lesson-edit-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(5, 10, 26, 0.78);
        backdrop-filter: blur(5px);
        z-index: 250;
      }

      .lesson-edit-modal.open {
        display: flex;
      }

      .lesson-edit-modal-card {
        width: 100%;
        max-width: 420px;
      }

      .auth-popup-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(5, 10, 26, 0.78);
        backdrop-filter: blur(5px);
        z-index: 260;
      }

      .auth-popup-modal.open {
        display: flex;
      }

      .auth-popup-card {
        width: 100%;
        max-width: 460px;
      }

      .auth-popup-card p {
        color: var(--muted);
        margin: 8px 0 0;
      }

      .delete-confirm-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(5, 10, 26, 0.78);
        backdrop-filter: blur(5px);
        z-index: 270;
      }

      .delete-confirm-modal.open {
        display: flex;
      }

      .delete-confirm-card {
        width: 100%;
        max-width: 460px;
      }

      .delete-confirm-card p {
        color: var(--muted);
        margin: 8px 0 0;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="/index.html" class="brand">
          <span class="brand-badge">L</span>
          <span>Learning Management System</span>
        </a>
        <nav class="nav-links" id="nav-links"></nav>
      </div>
    </header>

    <main class="container main">
      <div id="notice"></div>
      <section class="card" id="course-detail"></section>

      <section class="card" style="margin-top: 16px;">
        <div class="section-head">
          <h3>Lessons</h3>
          <p>Follow lesson order to unlock next content</p>
        </div>
        <div id="lessons-wrap"></div>
      </section>

      <div class="lesson-edit-modal" id="lesson-edit-modal" role="dialog" aria-modal="true" aria-labelledby="lesson-edit-modal-title">
        <article class="card lesson-edit-modal-card">
          <h3 id="lesson-edit-modal-title" style="margin-top:0;">Edit Lesson</h3>

          <label for="edit_lesson_title">Title</label>
          <input id="edit_lesson_title" required />

          <label for="edit_lesson_video_url">Video URL</label>
          <input id="edit_lesson_video_url" required />

          <label for="edit_lesson_order">Lesson Order</label>
          <input id="edit_lesson_order" type="number" min="1" step="1" required />

          <div class="form-actions" style="margin-top:16px;">
            <button class="btn" type="button" id="save-lesson-edit-btn">Save</button>
            <button class="btn secondary" type="button" id="cancel-lesson-edit-btn">Cancel</button>
          </div>
        </article>
      </div>

      <div class="auth-popup-modal" id="auth-popup-modal" role="dialog" aria-modal="true" aria-labelledby="auth-popup-title">
        <article class="card auth-popup-card">
          <h3 id="auth-popup-title" style="margin-top:0;">Continue To Enroll</h3>
          <p>Please login or signup to enroll in this course.</p>

          <div class="form-actions" style="margin-top:16px;">
            <button class="btn" type="button" id="auth-login-btn">Login</button>
            <button class="btn secondary" type="button" id="auth-signup-btn">Signup</button>
            <button class="btn secondary" type="button" id="auth-cancel-btn">Cancel</button>
          </div>
        </article>
      </div>

      <div class="delete-confirm-modal" id="delete-confirm-modal" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title">
        <article class="card delete-confirm-card">
          <h3 id="delete-confirm-title" style="margin-top:0;">Confirm Delete</h3>
          <p id="delete-confirm-message">Delete this lesson?</p>
          <div class="form-actions" style="margin-top:16px;">
            <button class="btn" style="background:#e53e3e; border-color:#e53e3e;" type="button" id="delete-confirm-yes">Delete</button>
            <button class="btn secondary" type="button" id="delete-confirm-no">Cancel</button>
          </div>
        </article>
      </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
      mountNav();

      const params = new URLSearchParams(window.location.search);
      const courseId = Number(params.get("id"));
      const notice = document.getElementById("notice");
      const detail = document.getElementById("course-detail");
      const lessonsWrap = document.getElementById("lessons-wrap");
      const user = getUser();
      const lessonEditModal = document.getElementById("lesson-edit-modal");
      const editLessonTitleInput = document.getElementById("edit_lesson_title");
      const editLessonVideoUrlInput = document.getElementById("edit_lesson_video_url");
      const editLessonOrderInput = document.getElementById("edit_lesson_order");
      const saveLessonEditBtn = document.getElementById("save-lesson-edit-btn");
      const cancelLessonEditBtn = document.getElementById("cancel-lesson-edit-btn");
      const authPopupModal = document.getElementById("auth-popup-modal");
      const authLoginBtn = document.getElementById("auth-login-btn");
      const authSignupBtn = document.getElementById("auth-signup-btn");
      const authCancelBtn = document.getElementById("auth-cancel-btn");
      const deleteConfirmModal = document.getElementById("delete-confirm-modal");
      const deleteConfirmMessage = document.getElementById("delete-confirm-message");
      const deleteConfirmYes = document.getElementById("delete-confirm-yes");
      const deleteConfirmNo = document.getElementById("delete-confirm-no");
      let editingLessonId = null;
      let lessonsById = new Map();
      let pendingDeleteLessonId = null;

      function openLessonEditModal(lessonId) {
        const lesson = lessonsById.get(Number(lessonId));
        if (!lesson) {
          showNotice(notice, "Lesson not found.", "error");
          return;
        }

        editingLessonId = lesson.id;
        editLessonTitleInput.value = lesson.title || "";
        editLessonVideoUrlInput.value = lesson.video_url || "";
        editLessonOrderInput.value = lesson.lesson_order || 1;
        lessonEditModal.classList.add("open");
      }

      function closeLessonEditModal() {
        editingLessonId = null;
        lessonEditModal.classList.remove("open");
      }

      async function loadCourse() {
        try {
          const course = await apiFetch(`/course/${courseId}`);
          detail.innerHTML = `
            <h2>${course.title}</h2>
            <p>${course.description}</p>
            <div class="meta">
              <span class="tag">Instructor: ${course.instructor}</span>
              <span class="tag">${course.lessons_count} lessons</span>
              <span class="tag">${course.pricing_type === "paid" ? `Paid ($${Number(course.price || 0).toFixed(2)})` : "Free"}</span>
            </div>
            <div class="form-actions" style="margin-top: 12px;">
              ${user && user.role === "student" ? `<button id="enroll-btn" class="btn" type="button">${course.pricing_type === "paid" ? "Pay & Enroll" : "Enroll in Course"}</button>` : ""}
              <a class="btn secondary" href="/dashboard.html">Back to Dashboard</a>
              ${!user ? `<button id="guest-enroll-btn" class="btn" type="button">${course.pricing_type === "paid" ? "Pay & Enroll" : "Free & Enroll"}</button>` : ""}
            </div>
            <div style="margin-top: 12px;">
              <strong>Progress</strong>
              <div class="progress"><span id="progress-fill" style="width:0%"></span></div>
              <small id="progress-label" style="color:var(--muted);">0%</small>
            </div>
          `;

          const enrollBtn = document.getElementById("enroll-btn");
          if (enrollBtn) {
            enrollBtn.addEventListener("click", enrollCourse);
          }

          const guestEnrollBtn = document.getElementById("guest-enroll-btn");
          if (guestEnrollBtn) {
            guestEnrollBtn.addEventListener("click", showGuestAuthPopup);
          }

          if (user) {
            await loadProgress();
            await loadLessons();
          } else {
            lessonsWrap.innerHTML = '<p style="color:var(--muted);">Login to view lessons and progress.</p>';
          }
        } catch (error) {
          detail.innerHTML = `<p>${error.message}</p>`;
        }
      }

      async function enrollCourse() {
        if (!requireAuth(["student"])) return;
        try {
          const result = await apiFetch("/enroll", {
            method: "POST",
            body: JSON.stringify({ course_id: courseId }),
          });
          if (result.payment_required) {
            showNotice(notice, result.message, "success");
            return;
          }
          showNotice(notice, result.message || "Enrollment successful.", "success");
          await loadLessons();
          await loadProgress();
        } catch (error) {
          showNotice(notice, error.message, "error");
        }
      }

      function showGuestAuthPopup() {
        authPopupModal.classList.add("open");
      }

      function closeGuestAuthPopup() {
        authPopupModal.classList.remove("open");
      }

      function openDeleteConfirmModal(lessonId) {
        pendingDeleteLessonId = lessonId;
        deleteConfirmMessage.textContent = "Delete this lesson?";
        deleteConfirmModal.classList.add("open");
      }

      function closeDeleteConfirmModal() {
        deleteConfirmModal.classList.remove("open");
        pendingDeleteLessonId = null;
      }

      async function deleteLesson(lessonId) {
        openDeleteConfirmModal(lessonId);
      }

      async function confirmDeleteLesson() {
        if (!pendingDeleteLessonId) return;
        const lessonId = pendingDeleteLessonId;
        closeDeleteConfirmModal();
        try {
          await apiFetch(`/lesson/${lessonId}`, { method: "DELETE" });
          showNotice(notice, "Lesson deleted.", "success");
          loadLessons();
        } catch (error) {
          showNotice(notice, error.message, "error");
        }
      }

      async function loadLessons() {
        try {
          const lessons = await apiFetch(`/course/${courseId}/lessons`);
          const isAdmin = user && user.role === "admin";
          lessonsById = new Map(lessons.map((lesson) => [lesson.id, lesson]));
          lessonsWrap.innerHTML = lessons.length
            ? lessons
                .map(
                  (lesson) => `
                    <div class="lesson-item ${lesson.unlocked ? "" : "locked"}">
                      <div>
                        <strong>Lesson ${lesson.lesson_order}: ${lesson.title}</strong><br />
                        <small style="color:var(--muted);">
                          ${lesson.completed ? "Completed" : lesson.unlocked ? "Unlocked" : "Locked"}
                        </small>
                      </div>
                      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                        ${lesson.unlocked ? `<a class="btn" href="/lesson.html?id=${lesson.id}&course=${courseId}">Open</a>` : '<button class="btn secondary" disabled>Locked</button>'}
                        ${isAdmin ? `<button class="btn secondary" type="button" onclick="openLessonEditModal(${lesson.id})">Edit</button>` : ""}
                        ${isAdmin ? `<button class="btn" style="background:#e53e3e; border-color:#e53e3e; padding:6px 12px;" onclick="deleteLesson(${lesson.id})">Delete</button>` : ""}
                      </div>
                    </div>
                  `
                )
                .join("")
            : '<p style="color:var(--muted);">No lessons available yet.</p>';
        } catch (error) {
          lessonsWrap.innerHTML = `<p style="color:var(--muted);">${error.message}</p>`;
        }
      }

      async function loadProgress() {
        try {
          const data = await apiFetch(`/course-progress/${courseId}`);
          const fill = document.getElementById("progress-fill");
          const label = document.getElementById("progress-label");
          if (fill) fill.style.width = `${data.percentage}%`;
          if (label) label.textContent = `${data.completed_lessons}/${data.total_lessons} lessons complete (${data.percentage}%)`;
        } catch {
          // Progress may be unavailable until enrolled.
        }
      }

      async function saveLessonEdits() {
        if (!editingLessonId) return;

        const title = editLessonTitleInput.value.trim();
        const videoUrl = editLessonVideoUrlInput.value.trim();
        const lessonOrder = Number(editLessonOrderInput.value);

        if (!title || !videoUrl || !Number.isInteger(lessonOrder) || lessonOrder < 1) {
          showNotice(notice, "Please enter valid lesson title, video URL, and order.", "error");
          return;
        }

        try {
          await apiFetch(`/lesson/${editingLessonId}`, {
            method: "PUT",
            body: JSON.stringify({
              title,
              video_url: videoUrl,
              lesson_order: lessonOrder,
            }),
          });

          closeLessonEditModal();
          showNotice(notice, "Lesson updated.", "success");
          await loadLessons();
        } catch (error) {
          showNotice(notice, error.message, "error");
        }
      }

      saveLessonEditBtn.addEventListener("click", saveLessonEdits);
      cancelLessonEditBtn.addEventListener("click", closeLessonEditModal);
      authLoginBtn.addEventListener("click", () => {
        window.location.href = "/login.html";
      });
      authSignupBtn.addEventListener("click", () => {
        window.location.href = "/signup.html";
      });
      authCancelBtn.addEventListener("click", closeGuestAuthPopup);
      deleteConfirmYes.addEventListener("click", confirmDeleteLesson);
      deleteConfirmNo.addEventListener("click", closeDeleteConfirmModal);
      lessonEditModal.addEventListener("click", (event) => {
        if (event.target === lessonEditModal) {
          closeLessonEditModal();
        }
      });
      authPopupModal.addEventListener("click", (event) => {
        if (event.target === authPopupModal) {
          closeGuestAuthPopup();
        }
      });
      deleteConfirmModal.addEventListener("click", (event) => {
        if (event.target === deleteConfirmModal) {
          closeDeleteConfirmModal();
        }
      });

      window.openLessonEditModal = openLessonEditModal;
      window.deleteLesson = deleteLesson;

      loadCourse();
    </script>
  </body>
</html>
