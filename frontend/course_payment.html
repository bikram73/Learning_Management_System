<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Payment | Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/img/lms-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="/index.html" class="brand">
          <span class="brand-badge">L</span>
          <span>Learning Management System</span>
        </a>
        <nav class="nav-links" id="nav-links"></nav>
      </div>
    </header>

    <main class="container main">
      <section class="card form-wrap" style="max-width:560px;">
        <h2>Complete Course Payment</h2>
        <p id="payment-summary" style="color:var(--muted);">Loading payment details...</p>

        <form id="payment-form" style="display:none;">
          <label for="email">Email</label>
          <input id="email" type="email" required />

          <label for="password">Password</label>
          <input id="password" type="password" required />

          <div class="form-actions" style="margin-top:16px;">
            <button class="btn" type="submit">Pay & Enroll</button>
            <a class="btn secondary" href="/login.html">Login</a>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      mountNav();

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";
      const summary = document.getElementById("payment-summary");
      const form = document.getElementById("payment-form");

      async function loadPaymentRequest() {
        if (!token) {
          summary.textContent = "Invalid payment link.";
          return;
        }
        try {
          const data = await apiFetch(`/payment/${encodeURIComponent(token)}`);
          summary.textContent = `Course: ${data.course_title} | Amount: $${Number(data.amount).toFixed(2)}`;
          form.style.display = "block";
          if (data.email_hint) {
            document.getElementById("email").value = data.email_hint;
          }
        } catch (error) {
          summary.textContent = error.message;
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          };
          const result = await apiFetch(`/payment/${encodeURIComponent(token)}/complete`, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          showToast(result.message, "success");
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 700);
        } catch (error) {
          showToast(error.message, "error");
        }
      });

      loadPaymentRequest();
    </script>
  </body>
</html>
