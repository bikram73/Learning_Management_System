<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/img/lms-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="/index.html" class="brand">
          <span class="brand-badge">L</span>
          <span>Learning Management System</span>
        </a>
        <nav class="nav-links" id="nav-links"></nav>
      </div>
    </header>

    <main class="container main">
      <section class="card form-wrap">
        <h2>Welcome Back</h2>
        <p style="color: var(--muted);">Login to continue your learning journey.</p>

        <div id="notice"></div>

        <form id="login-form">
          <label for="email">Email</label>
          <input id="email" type="email" required />

          <label for="password">Password</label>
          <div class="password-field-wrapper">
            <input id="password" type="password" required />
            <button class="password-toggle-btn" id="password-toggle" type="button" title="Show password">👁️</button>
          </div>

          <div class="form-actions">
            <button class="btn" type="submit">Login</button>
            <a class="btn secondary" href="/signup.html">Create account</a>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      mountNav();
      if (isLoggedIn()) {
        window.location.href = "/dashboard.html";
      }

      const form = document.getElementById("login-form");
      const notice = document.getElementById("notice");

      // Password visibility toggle
      const passwordField = document.getElementById("password");
      const passwordToggle = document.getElementById("password-toggle");
      let passwordVisible = false;

      passwordToggle.addEventListener("click", (e) => {
        e.preventDefault();
        passwordVisible = !passwordVisible;
        passwordField.type = passwordVisible ? "text" : "password";
        passwordToggle.textContent = passwordVisible ? "🙈" : "👁️";
        passwordToggle.title = passwordVisible ? "Hide password" : "Show password";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = await apiFetch("/login", {
            method: "POST",
            body: JSON.stringify({
              email: document.getElementById("email").value,
              password: document.getElementById("password").value,
            }),
          });

          setSession(payload.token, payload.user);
          showNotice(notice, "Login successful. Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 500);
        } catch (error) {
          showNotice(notice, error.message, "error");
        }
      });
    </script>
  </body>
</html>
