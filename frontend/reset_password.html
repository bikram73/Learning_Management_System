<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/img/lms-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="/index.html" class="brand">
          <span class="brand-badge">L</span>
          <span>Learning Management System</span>
        </a>
        <nav class="nav-links" id="nav-links"></nav>
      </div>
    </header>

    <main class="container main">
      <section class="card form-wrap">
        <h2>Reset Your Password</h2>
        <p style="color: var(--muted);">Enter your new password below.</p>

        <div id="notice"></div>

        <form id="reset-password-form">
          <label for="email">Email Address</label>
          <input id="email" type="email" readonly />
          <small style="color: var(--muted);">This is the email associated with your account.</small>

          <label for="password">Password</label>
          <div class="password-field-wrapper">
            <input id="password" type="password" minlength="10" required />
            <button class="password-toggle-btn" id="password-toggle" type="button" title="Show password">👁️</button>
          </div>
          <small style="color: var(--muted);">Password must be at least 10 characters long.</small>

          <label for="confirm_password">Confirm Password</label>
          <div class="password-field-wrapper">
            <input id="confirm_password" type="password" minlength="10" required />
            <button class="password-toggle-btn" id="confirm-password-toggle" type="button" title="Show password">👁️</button>
          </div>
          <small style="color: var(--muted);">Both passwords must match.</small>

          <div class="form-actions">
            <button class="btn" type="submit">Reset Password</button>
            <a class="btn secondary" href="/login.html">Back to Login</a>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      mountNav();
      if (isLoggedIn()) {
        window.location.href = "/dashboard.html";
      }

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const form = document.getElementById("reset-password-form");
      const emailField = document.getElementById("email");
      const passwordField = document.getElementById("password");
      const passwordToggle = document.getElementById("password-toggle");
      const confirmPasswordField = document.getElementById("confirm_password");
      const confirmPasswordToggle = document.getElementById("confirm-password-toggle");
      let passwordVisible = false;
      let confirmPasswordVisible = false;

      // Validate token and fetch user email
      async function validateToken() {
        if (!token) {
          showToast("Invalid or missing reset token.", "error");
          setTimeout(() => {
            window.location.href = "/login.html";
          }, 2000);
          return;
        }

        try {
          const response = await apiFetch(`/reset-password/${token}`, { method: "GET" });
          emailField.value = response.email || "";
        } catch (error) {
          showToast("Reset link has expired or is invalid. Please request a new one.", "error");
          setTimeout(() => {
            window.location.href = "/forgot_password.html";
          }, 2000);
        }
      }

      // Password visibility toggles
      passwordToggle.addEventListener("click", (e) => {
        e.preventDefault();
        passwordVisible = !passwordVisible;
        passwordField.type = passwordVisible ? "text" : "password";
        passwordToggle.textContent = passwordVisible ? "🙈" : "👁️";
        passwordToggle.title = passwordVisible ? "Hide password" : "Show password";
      });

      confirmPasswordToggle.addEventListener("click", (e) => {
        e.preventDefault();
        confirmPasswordVisible = !confirmPasswordVisible;
        confirmPasswordField.type = confirmPasswordVisible ? "text" : "password";
        confirmPasswordToggle.textContent = confirmPasswordVisible ? "🙈" : "👁️";
        confirmPasswordToggle.title = confirmPasswordVisible ? "Hide password" : "Show password";
      });

      // Form submission
      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const password = passwordField.value;
        const confirmPassword = confirmPasswordField.value;

        if (password.length < 10) {
          showToast("Password must be at least 10 characters long.", "error");
          return;
        }

        if (password !== confirmPassword) {
          showToast("Both passwords must match.", "error");
          return;
        }

        try {
          await apiFetch("/reset-password", {
            method: "POST",
            body: JSON.stringify({
              token,
              password,
            }),
          });

          showToast("Password reset successfully. Redirecting to login...", "success");
          setTimeout(() => {
            window.location.href = "/login.html";
          }, 1500);
        } catch (error) {
          showToast(error.message, "error");
        }
      });

      validateToken();
    </script>
  </body>
</html>
