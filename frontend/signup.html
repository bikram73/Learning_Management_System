<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup | Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/img/lms-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="/index.html" class="brand">
          <span class="brand-badge">L</span>
          <span>Learning Management System</span>
        </a>
        <nav class="nav-links" id="nav-links"></nav>
      </div>
    </header>

    <main class="container main">
      <section class="card form-wrap">
        <h2>Create Account</h2>
        <p style="color: var(--muted);">Signup as student or admin.</p>

        <form id="signup-form">
          <label for="role">Account Type</label>
          <select id="role">
            <option value="student">Student</option>
            <option value="admin">Admin</option>
          </select>

          <label for="name">Name</label>
          <input id="name" type="text" required />

          <label for="email">Email</label>
          <input id="email" type="email" required />

          <label for="password">Password</label>
          <input id="password" type="password" minlength="6" required />

          <div id="admin-code-wrap" style="display:none;">
            <label for="admin_code">Admin Secret Code</label>
            <input id="admin_code" type="text" placeholder="Enter ADMIN2026" />
            <small style="color: var(--muted);">Use code: ADMIN2026</small>
          </div>

          <div class="form-actions">
            <button class="btn" type="submit">Create Account</button>
            <a class="btn secondary" href="/login.html">I already have an account</a>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      mountNav();

      const roleField = document.getElementById("role");
      const adminCodeWrap = document.getElementById("admin-code-wrap");
      const form = document.getElementById("signup-form");

      function syncRoleUI() {
        const isAdmin = roleField.value === "admin";
        adminCodeWrap.style.display = isAdmin ? "block" : "none";
        document.getElementById("admin_code").required = isAdmin;
      }

      roleField.addEventListener("change", syncRoleUI);
      syncRoleUI();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const role = roleField.value;
        const endpoint = role === "admin" ? "/signup/admin" : "/signup/student";
        const payload = {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        };

        if (role === "admin") {
          payload.admin_code = document.getElementById("admin_code").value;
        }

        try {
          await apiFetch(endpoint, {
            method: "POST",
            body: JSON.stringify(payload),
          });

          form.reset();
          syncRoleUI();
          setFlashToast("Account created successfully. Please login.", "success");
          window.location.href = "/login.html";
        } catch (error) {
          showToast(error.message, "error");
        }
      });
    </script>
  </body>
</html>
