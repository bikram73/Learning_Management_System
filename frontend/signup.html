<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup | Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/img/lms-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="/index.html" class="brand">
          <span class="brand-badge">L</span>
          <span>Learning Management System</span>
        </a>
        <nav class="nav-links" id="nav-links"></nav>
      </div>
    </header>

    <main class="container main">
      <section class="card form-wrap">
        <h2>Create Account</h2>
        <p style="color: var(--muted);">Signup as student or admin.</p>

        <form id="signup-form">
          <label for="role">Account Type</label>
          <select id="role">
            <option value="student">Student</option>
            <option value="admin">Admin</option>
          </select>

          <label for="name">Username</label>
          <input id="name" type="text" required />

          <label for="email">Email address</label>
          <input id="email" type="email" required />
          <small style="color: var(--muted);">Please enter a valid @gmail.com address to receive notifications.</small>

          <label for="password">Password</label>
          <div class="password-field-wrapper">
            <input id="password" type="password" minlength="10" required />
            <button class="password-toggle-btn" id="password-toggle" type="button" title="Show password">👁️</button>
          </div>
          <small style="color: var(--muted);">Password must be at least 10 characters long.</small>

          <label for="confirm_password">Confirm Password</label>
          <div class="password-field-wrapper">
            <input id="confirm_password" type="password" minlength="10" required />
            <button class="password-toggle-btn" id="confirm-password-toggle" type="button" title="Show password">👁️</button>
          </div>
          <small style="color: var(--muted);">Both passwords must match.</small>

          <div id="admin-code-wrap" style="display:none;">
            <label for="admin_code">Admin Secret Code</label>
            <input id="admin_code" type="text" placeholder="Enter ADMIN2026" />
            <small style="color: var(--muted);">Use code: ADMIN2026</small>
          </div>

          <div class="form-actions">
            <button class="btn" type="submit">Create Account</button>
            <a class="btn secondary" href="/login.html">I already have an account</a>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      mountNav();

      const roleField = document.getElementById("role");
      const adminCodeWrap = document.getElementById("admin-code-wrap");
      const form = document.getElementById("signup-form");

      function syncRoleUI() {
        const isAdmin = roleField.value === "admin";
        adminCodeWrap.style.display = isAdmin ? "block" : "none";
        document.getElementById("admin_code").required = isAdmin;
      }

      roleField.addEventListener("change", syncRoleUI);
      syncRoleUI();

      // Password visibility toggles
      const passwordField = document.getElementById("password");
      const passwordToggle = document.getElementById("password-toggle");
      const confirmPasswordField = document.getElementById("confirm_password");
      const confirmPasswordToggle = document.getElementById("confirm-password-toggle");
      let passwordVisible = false;
      let confirmPasswordVisible = false;

      passwordToggle.addEventListener("click", (e) => {
        e.preventDefault();
        passwordVisible = !passwordVisible;
        passwordField.type = passwordVisible ? "text" : "password";
        passwordToggle.textContent = passwordVisible ? "🙈" : "👁️";
        passwordToggle.title = passwordVisible ? "Hide password" : "Show password";
      });

      confirmPasswordToggle.addEventListener("click", (e) => {
        e.preventDefault();
        confirmPasswordVisible = !confirmPasswordVisible;
        confirmPasswordField.type = confirmPasswordVisible ? "text" : "password";
        confirmPasswordToggle.textContent = confirmPasswordVisible ? "🙈" : "👁️";
        confirmPasswordToggle.title = confirmPasswordVisible ? "Hide password" : "Show password";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const role = roleField.value;
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;

        if (!/^[^\s@]+@gmail\.com$/i.test(email)) {
          showToast("Please enter a valid @gmail.com address to receive notifications.", "error");
          return;
        }

        if (password.length < 10) {
          showToast("Password must be at least 10 characters long.", "error");
          return;
        }

        if (password !== confirmPassword) {
          showToast("Both passwords must match.", "error");
          return;
        }

        const endpoint = role === "admin" ? "/signup/admin" : "/signup/student";
        const payload = {
          name: document.getElementById("name").value,
          email,
          password,
        };

        if (role === "admin") {
          payload.admin_code = document.getElementById("admin_code").value;
        }

        try {
          await apiFetch(endpoint, {
            method: "POST",
            body: JSON.stringify(payload),
          });

          form.reset();
          syncRoleUI();
          setFlashToast("Account created successfully. Please login.", "success");
          window.location.href = "/login.html";
        } catch (error) {
          showToast(error.message, "error");
        }
      });
    </script>
  </body>
</html>
