<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/img/lms-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .pricing-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(5, 10, 26, 0.78);
        backdrop-filter: blur(5px);
        z-index: 250;
      }
      .pricing-modal.open {
        display: flex;
      }
      .pricing-modal-card {
        width: 100%;
        max-width: 420px;
      }
      .confirm-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(5, 10, 26, 0.78);
        backdrop-filter: blur(5px);
        z-index: 260;
      }
      .confirm-modal.open {
        display: flex;
      }
      .confirm-modal-card {
        width: 100%;
        max-width: 460px;
      }
      .confirm-modal-card p {
        color: var(--muted);
        margin: 8px 0 0;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="/index.html" class="brand">
          <span class="brand-badge">L</span>
          <span>Learning Management System</span>
        </a>
        <div style="display:flex;align-items:center;gap:6px;">
          <a class="btn secondary" href="/profile.html" style="padding:8px 14px;">&#9881; Profile</a>
          <nav class="nav-links" id="nav-links"></nav>
        </div>
      </div>
    </header>

    <main class="container main">
      <div class="section-head">
        <h2 id="title">Dashboard</h2>
        <p id="subtitle"></p>
      </div>

      <section id="admin-panel" style="display:none; margin-top: 10px; margin-bottom: 26px;">
        <div class="section-head">
          <h3>Admin Panel</h3>
          <p>Create courses and lessons</p>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 16px;">
          <article class="card">
            <h3>Create Course</h3>
            <form id="create-course-form">
              <label for="course_title">Title</label>
              <input id="course_title" required />

              <label for="course_description">Description</label>
              <textarea id="course_description" required></textarea>

              <label for="course_instructor">Instructor</label>
              <input id="course_instructor" required />

              <label for="course_thumbnail">Thumbnail URL (optional)</label>
              <input id="course_thumbnail" />

              <label for="course_pricing_type">Pricing</label>
              <select id="course_pricing_type">
                <option value="free">Free</option>
                <option value="paid">Paid</option>
              </select>

              <label for="course_price">Price (USD)</label>
              <input id="course_price" type="number" min="0" step="0.01" placeholder="e.g. 49.99" disabled />

              <div class="form-actions">
                <button class="btn" type="submit">Create Course</button>
              </div>
            </form>
          </article>

          <article class="card">
            <h3>Add Lesson</h3>
            <form id="create-lesson-form">
              <label for="lesson_course_id">Course ID</label>
              <input id="lesson_course_id" type="number" required placeholder="Enter course ID" />
              <small id="lesson_course_hint" style="color:var(--muted); font-size:0.8rem;"></small>

              <label for="lesson_title">Lesson Title</label>
              <input id="lesson_title" required />

              <label for="lesson_video_url">YouTube Embed URL</label>
              <input id="lesson_video_url" required placeholder="https://www.youtube.com/embed/VIDEO_ID" />

              <label for="lesson_order">Lesson Order <span style="color:var(--muted);font-size:0.8rem;">(auto-filled)</span></label>
              <input id="lesson_order" type="number" min="1" required />

              <div class="form-actions">
                <button class="btn accent" type="submit">Add Lesson</button>
              </div>
            </form>
          </article>


        </div>
      </section>

      <div id="notice"></div>

      <section>
        <div class="section-head">
          <h3>My Courses</h3>
          <p>Continue where you left off</p>
        </div>
        <div class="grid cols-3" id="my-courses"></div>
      </section>

      <section id="all-courses-section" style="margin-top: 26px;">
        <div class="section-head">
          <div class="section-head-text">
            <h3>All Courses</h3>
            <p>Discover and enroll</p>
          </div>
          <div class="courses-search-wrapper">
            <input
              type="text"
              id="all-courses-search"
              class="courses-search-input"
              placeholder="Search by title, description, or instructor..."
            />
          </div>
        </div>
        <div class="grid cols-3" id="all-courses"></div>
      </section>

      <div class="pricing-modal" id="pricing-modal" role="dialog" aria-modal="true" aria-labelledby="pricing-modal-title">
        <article class="card pricing-modal-card">
          <h3 id="pricing-modal-title" style="margin-top:0;">Edit Course</h3>

          <label for="modal_title">Title</label>
          <input id="modal_title" required />

          <label for="modal_description">Description</label>
          <textarea id="modal_description" required></textarea>

          <label for="modal_thumbnail">Thumbnail URL (optional)</label>
          <input id="modal_thumbnail" placeholder="https://example.com/thumbnail.jpg" />

          <label for="modal_pricing_type">Pricing Type</label>
          <select id="modal_pricing_type">
            <option value="free">Free</option>
            <option value="paid">Paid</option>
          </select>

          <label for="modal_price">Price (USD)</label>
          <input id="modal_price" type="number" min="0" step="0.01" placeholder="e.g. 49.99" disabled />

          <div class="form-actions" style="margin-top:16px;">
            <button class="btn" type="button" id="save-pricing-btn">Save</button>
            <button class="btn secondary" type="button" id="cancel-pricing-btn">Cancel</button>
          </div>
        </article>
      </div>

      <div class="confirm-modal" id="delete-confirm-modal" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title">
        <article class="card confirm-modal-card">
          <h3 id="delete-confirm-title" style="margin-top:0;">Confirm Delete</h3>
          <p id="delete-confirm-message">Are you sure you want to delete this item?</p>
          <div class="form-actions" style="margin-top:16px;">
            <button class="btn" style="background:#e53e3e; border-color:#e53e3e;" type="button" id="delete-confirm-yes">Delete</button>
            <button class="btn secondary" type="button" id="delete-confirm-no">Cancel</button>
          </div>
        </article>
      </div>

    </main>

    <script src="/js/app.js"></script>
    <script>
      mountNav();
      if (!requireAuth()) {
        throw new Error("Auth required");
      }

      const user = getUser();
      const notice = document.getElementById("notice");
      const pricingModal = document.getElementById("pricing-modal");
      const modalTitle = document.getElementById("modal_title");
      const modalDescription = document.getElementById("modal_description");
      const modalPricingType = document.getElementById("modal_pricing_type");
      const modalPrice = document.getElementById("modal_price");
      const modalThumbnail = document.getElementById("modal_thumbnail");
      const savePricingBtn = document.getElementById("save-pricing-btn");
      const cancelPricingBtn = document.getElementById("cancel-pricing-btn");
      const deleteConfirmModal = document.getElementById("delete-confirm-modal");
      const deleteConfirmMessage = document.getElementById("delete-confirm-message");
      const deleteConfirmYes = document.getElementById("delete-confirm-yes");
      const deleteConfirmNo = document.getElementById("delete-confirm-no");
      let editingCourseId = null;
      let adminCoursesById = new Map();
      let pendingDeleteAction = null;
      document.getElementById("title").textContent = `${user.name}'s Dashboard`;
      document.getElementById("subtitle").textContent = user.role === "admin" ? "Admin controls enabled" : "Track your learning progress";

      if (user.role === "admin") {
        document.getElementById("admin-panel").style.display = "block";
        document.getElementById("all-courses-section").style.display = "none";
      }

      function fmtAdminCourseCard(course) {
        const thumb = course.thumbnail || "https://images.unsplash.com/photo-1513258496099-48168024aec0?auto=format&fit=crop&w=900&q=70";
        return `
          <article class="card stagger">
            <img src="${thumb}" alt="${course.title}" style="width:100%;height:170px;object-fit:cover;border-radius:12px;" />
            <span class="tag" style="display:inline-block;margin-bottom:6px;color:var(--muted);">ID: ${course.id}</span>
            <h3>${course.title}</h3>
            <p>${course.description}</p>
            <div class="meta">
              <span class="tag">Instructor: ${course.instructor}</span>
              <span class="tag">${course.lessons_count} lessons</span>
              <span class="tag">${course.pricing_type === "paid" ? `Paid ($${Number(course.price || 0).toFixed(2)})` : "Free"}</span>
            </div>
            <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
              <a class="btn secondary" href="/course.html?id=${course.id}">Open</a>
              <button class="btn warn" type="button" onclick="changeCoursePricing(${course.id})">Edit Course</button>
              <button class="btn" style="background:#e53e3e; border-color:#e53e3e;" onclick="deleteCourse(${course.id})">Delete Course</button>
            </div>
          </article>
        `;
      }

      function syncPricingModalFields() {
        const isPaid = modalPricingType.value === "paid";
        modalPrice.disabled = !isPaid;
        modalPrice.required = isPaid;
        if (!isPaid) {
          modalPrice.value = "";
        }
      }

      function closePricingModal() {
        pricingModal.classList.remove("open");
        editingCourseId = null;
      }

      function openDeleteConfirmModal(message, onConfirm) {
        deleteConfirmMessage.textContent = message;
        pendingDeleteAction = onConfirm;
        deleteConfirmModal.classList.add("open");
      }

      function closeDeleteConfirmModal() {
        deleteConfirmModal.classList.remove("open");
        pendingDeleteAction = null;
      }

      async function changeCoursePricing(courseId) {
        editingCourseId = courseId;
        const course = adminCoursesById.get(courseId);
        modalTitle.value = course?.title || "";
        modalDescription.value = course?.description || "";
        modalPricingType.value = course?.pricing_type || "free";
        modalPrice.value = course?.pricing_type === "paid" ? String(Number(course?.price || 0)) : "";
        modalThumbnail.value = course?.thumbnail || "";
        syncPricingModalFields();
        pricingModal.classList.add("open");
      }

      modalPricingType.addEventListener("change", syncPricingModalFields);
      cancelPricingBtn.addEventListener("click", closePricingModal);
      pricingModal.addEventListener("click", (event) => {
        if (event.target === pricingModal) {
          closePricingModal();
        }
      });

      savePricingBtn.addEventListener("click", async () => {
        if (!editingCourseId) return;

        const pricingType = modalPricingType.value;
        const payload = {
          title: modalTitle.value.trim(),
          description: modalDescription.value.trim(),
          pricing_type: pricingType,
          thumbnail: modalThumbnail.value.trim(),
        };
        if (!payload.title) {
          showNotice(notice, "Title is required.", "error");
          return;
        }
        if (!payload.description) {
          showNotice(notice, "Description is required.", "error");
          return;
        }
        if (pricingType === "paid") {
          const amount = Number(modalPrice.value);
          if (!Number.isFinite(amount) || amount <= 0) {
            showNotice(notice, "Price must be a number greater than 0.", "error");
            return;
          }
          payload.price = amount;
        }

        try {
          await apiFetch(`/course/${editingCourseId}`, {
            method: "PUT",
            body: JSON.stringify(payload),
          });
          closePricingModal();
          showNotice(notice, "Course updated successfully.", "success");
          loadMyCourses();
        } catch (error) {
          showNotice(notice, error.message, "error");
        }
      });

      async function deleteCourse(courseId) {
        openDeleteConfirmModal("Delete this course? All its lessons will also be deleted.", async () => {
          try {
            await apiFetch(`/course/${courseId}`, { method: "DELETE" });
            showNotice(notice, "Course deleted successfully.", "success");
            loadMyCourses();
          } catch (error) {
            showNotice(notice, error.message, "error");
          }
        });
      }

      async function loadLessonsForManage() {
        const courseId = document.getElementById("manage_course_id").value;
        if (!courseId) return;
        const listEl = document.getElementById("lessons-list");
        listEl.innerHTML = '<p style="color:var(--muted); font-size:0.875rem;">Loading...</p>';
        try {
          const lessons = await apiFetch(`/course/${courseId}/lessons`);
          if (!lessons.length) {
            listEl.innerHTML = '<p style="color:var(--muted); font-size:0.875rem;">No lessons found.</p>';
            return;
          }
          listEl.innerHTML = lessons
            .sort((a, b) => a.lesson_order - b.lesson_order)
            .map(
              (lesson) => `
              <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border, #eee);">
                <span style="font-size:0.875rem;">#${lesson.lesson_order} &ndash; ${lesson.title}</span>
                <button class="btn" style="padding:4px 10px; font-size:0.75rem; background:#e53e3e; border-color:#e53e3e; flex-shrink:0; margin-left:8px;" onclick="deleteLessonById(${lesson.id}, ${courseId})">Delete</button>
              </div>`
            )
            .join("");
        } catch (error) {
          listEl.innerHTML = `<p style="color:#e53e3e; font-size:0.875rem;">${error.message}</p>`;
        }
      }

      async function deleteLessonById(lessonId, courseId) {
        openDeleteConfirmModal("Delete this lesson?", async () => {
          try {
            await apiFetch(`/lesson/${lessonId}`, { method: "DELETE" });
            showNotice(notice, "Lesson deleted successfully.", "success");
            document.getElementById("manage_course_id").value = courseId;
            loadLessonsForManage();
          } catch (error) {
            showNotice(notice, error.message, "error");
          }
        });
      }

      deleteConfirmYes.addEventListener("click", async () => {
        if (!pendingDeleteAction) return;
        const action = pendingDeleteAction;
        closeDeleteConfirmModal();
        await action();
      });

      deleteConfirmNo.addEventListener("click", closeDeleteConfirmModal);
      deleteConfirmModal.addEventListener("click", (event) => {
        if (event.target === deleteConfirmModal) {
          closeDeleteConfirmModal();
        }
      });

      window.deleteCourse = deleteCourse;
      window.deleteLessonById = deleteLessonById;

      async function loadMyCourses() {
        const wrap = document.getElementById("my-courses");
        try {
          const courses = await apiFetch("/my-courses");
          if (user.role === "admin") {
            adminCoursesById = new Map(courses.map((course) => [course.id, course]));
          }
          wrap.innerHTML = courses.length
            ? courses.map((course) => user.role === "admin" ? fmtAdminCourseCard(course) : fmtCourseCard(course)).join("")
            : '<article class="card">No courses yet.</article>';
        } catch (error) {
          wrap.innerHTML = `<article class="card">${error.message}</article>`;
        }
      }

      let allCoursesData = [];

      function filterAllCourses(query) {
        const wrap = document.getElementById("all-courses");
        if (!query.trim()) {
          wrap.innerHTML = allCoursesData.length
            ? allCoursesData.map((course) => fmtCourseCard(course, true)).join("")
            : '<article class="card">No courses available.</article>';
          return;
        }

        const lowerQuery = query.toLowerCase();
        const filtered = allCoursesData.filter(
          (course) =>
            course.title.toLowerCase().includes(lowerQuery) ||
            course.description.toLowerCase().includes(lowerQuery) ||
            course.instructor.toLowerCase().includes(lowerQuery)
        );

        if (!filtered.length) {
          wrap.innerHTML = '<article class="card">No courses match your search.</article>';
          return;
        }
        wrap.innerHTML = filtered.map((course) => fmtCourseCard(course, true)).join("");
      }

      const allCoursesSearchInput = document.getElementById("all-courses-search");
      if (allCoursesSearchInput) {
        allCoursesSearchInput.addEventListener("input", (e) => filterAllCourses(e.target.value));
      }

      async function loadAllCourses() {
        const wrap = document.getElementById("all-courses");
        try {
          allCoursesData = await apiFetch("/courses");
          wrap.innerHTML = allCoursesData.length
            ? allCoursesData.map((course) => fmtCourseCard(course, true)).join("")
            : '<article class="card">No courses available.</article>';
        } catch (error) {
          wrap.innerHTML = `<article class="card">${error.message}</article>`;
        }
      }

      const createCourseForm = document.getElementById("create-course-form");
      const coursePricingType = document.getElementById("course_pricing_type");
      const coursePriceInput = document.getElementById("course_price");

      function syncCoursePricingFields() {
        const isPaid = coursePricingType.value === "paid";
        coursePriceInput.disabled = !isPaid;
        coursePriceInput.required = isPaid;
        if (!isPaid) {
          coursePriceInput.value = "";
        }
      }

      if (coursePricingType) {
        coursePricingType.addEventListener("change", syncCoursePricingFields);
        syncCoursePricingFields();
      }

      if (createCourseForm) {
        createCourseForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          try {
            const pricingType = document.getElementById("course_pricing_type").value;
            const payload = {
              title: document.getElementById("course_title").value,
              description: document.getElementById("course_description").value,
              instructor: document.getElementById("course_instructor").value,
              thumbnail: document.getElementById("course_thumbnail").value,
              pricing_type: pricingType,
            };
            if (pricingType === "paid") {
              payload.price = Number(document.getElementById("course_price").value);
            }

            await apiFetch("/course", {
              method: "POST",
              body: JSON.stringify(payload),
            });

            showNotice(notice, "Course created successfully.", "success");
            createCourseForm.reset();
            loadMyCourses();
            loadAllCourses();
          } catch (error) {
            showNotice(notice, error.message, "error");
          }
        });
      }

      async function fetchNextLessonOrder(courseId) {
        const hintEl = document.getElementById("lesson_course_hint");
        const orderEl = document.getElementById("lesson_order");
        if (!courseId) {
          hintEl.textContent = "";
          orderEl.value = "";
          return;
        }
        try {
          const lessons = await apiFetch(`/course/${courseId}/lessons`);
          const nextOrder = lessons.length > 0 ? Math.max(...lessons.map((l) => l.lesson_order)) + 1 : 1;
          orderEl.value = nextOrder;
          hintEl.textContent = `Course has ${lessons.length} lesson(s). Next order: ${nextOrder}`;
        } catch {
          hintEl.textContent = "Course not found or not accessible.";
          orderEl.value = "";
        }
      }

      const lessonCourseIdInput = document.getElementById("lesson_course_id");
      if (lessonCourseIdInput) {
        lessonCourseIdInput.addEventListener("change", () => {
          fetchNextLessonOrder(lessonCourseIdInput.value);
        });
        lessonCourseIdInput.addEventListener("blur", () => {
          fetchNextLessonOrder(lessonCourseIdInput.value);
        });
      }

      const createLessonForm = document.getElementById("create-lesson-form");
      if (createLessonForm) {
        createLessonForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          const courseId = Number(document.getElementById("lesson_course_id").value);
          try {
            await apiFetch("/lesson", {
              method: "POST",
              body: JSON.stringify({
                course_id: courseId,
                title: document.getElementById("lesson_title").value,
                video_url: document.getElementById("lesson_video_url").value,
                lesson_order: Number(document.getElementById("lesson_order").value),
              }),
            });

            showNotice(notice, "Lesson added successfully.", "success");
            // Keep course ID so admin can add more lessons; clear only title/url/order
            document.getElementById("lesson_title").value = "";
            document.getElementById("lesson_video_url").value = "";
            // Refresh next order for the same course
            fetchNextLessonOrder(courseId);
          } catch (error) {
            showNotice(notice, error.message, "error");
          }
        });
      }

      const loadLessonsBtn = document.getElementById("load-lessons-btn");
      if (loadLessonsBtn) {
        loadLessonsBtn.addEventListener("click", loadLessonsForManage);
      }

      loadMyCourses();
      if (user.role !== "admin") {
        loadAllCourses();
      }
    </script>
  </body>
</html>
