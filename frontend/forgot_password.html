<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/img/lms-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="/index.html" class="brand">
          <span class="brand-badge">L</span>
          <span>Learning Management System</span>
        </a>
        <nav class="nav-links" id="nav-links"></nav>
      </div>
    </header>

    <main class="container main">
      <section class="card form-wrap">
        <h2>Forgot Password?</h2>
        <p style="color: var(--muted);">Enter your email to receive a reset link.</p>

        <div id="notice"></div>

        <form id="forgot-password-form">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="name@gmail.com" required />
          <small style="color: var(--muted);">Please enter a valid @gmail.com address which you have already created to receive notifications.</small>

          <div class="form-actions">
            <button class="btn" type="submit">Send Reset Link</button>
            <a class="btn secondary" href="/login.html">Back to Login</a>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      mountNav();
      if (isLoggedIn()) {
        window.location.href = "/dashboard.html";
      }

      const form = document.getElementById("forgot-password-form");
      const notice = document.getElementById("notice");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        
        const email = document.getElementById("email").value.trim();

        // Validate @gmail.com
        if (!/^[^\s@]+@gmail\.com$/i.test(email)) {
          showToast("Please enter a valid @gmail.com address which you have already created to receive notifications.", "error");
          return;
        }

        try {
          await apiFetch("/forgot-password", {
            method: "POST",
            body: JSON.stringify({ email }),
          });

          showToast("If an account with this email exists, a reset link has been sent to your inbox.", "success");
          form.reset();
          setTimeout(() => {
            window.location.href = "/login.html";
          }, 2000);
        } catch (error) {
          showToast(error.message, "error");
        }
      });
    </script>
  </body>
</html>
